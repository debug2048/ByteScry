name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B -Djavafx.classifier=linux test

  release-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Linux artifacts
        run: mvn -B -Prelease-linux -Dwatermark.id=github-${{ github.ref_name }}-${{ github.sha }}-${{ github.run_id }} clean package

      - name: Collect Linux artifacts
        run: |
          mkdir -p dist
          cp bytescry-cli/target/bytescry-cli-*-linux-x64.tar.gz dist/
          cp bytescry-gui/target/bytescry-gui-*-linux-x64.zip dist/
          cp LICENSE THIRD_PARTY_NOTICES.md dist/
          (cd dist && sha256sum * > SHA256SUMS-linux.txt)

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bytescry-linux-release
          path: dist/*

  release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Windows artifact
        shell: pwsh
        run: mvn -B -Prelease-windows "-Dwatermark.id=github-${{ github.ref_name }}-${{ github.sha }}-${{ github.run_id }}" clean package

      - name: Collect Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bytescry-gui/target/bytescry.exe dist/bytescry.exe
          Copy-Item LICENSE dist/LICENSE
          Copy-Item THIRD_PARTY_NOTICES.md dist/THIRD_PARTY_NOTICES.md
          Get-FileHash dist/* -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content dist/SHA256SUMS-windows.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytescry-windows-release
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - release-linux
      - release-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: bytescry-linux-release
          path: dist

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: bytescry-windows-release
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ByteScry ${{ github.ref_name }} release assets.
